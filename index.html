<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קוראים ונהנים</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- App Container -->
    <div id="app" class="app-container">

        <!-- PLAY TAB -->
        <main id="play-tab" class="tab-content active">
            <!-- Sticky HUD -->
            <header class="hud">
                <div class="hud-item level-badge">
                    <span class="hud-label">רמה</span>
                    <span id="hud-level" class="hud-value">1</span>
                </div>
                <div class="hud-item streak-badge" id="hud-streak-container">
                    <span class="hud-label">רצף</span>
                    <span id="hud-streak" class="hud-value">0</span>🔥
                </div>
                <div class="hud-item coins-badge">
                    <span id="hud-coins" class="hud-value">0</span>🪙
                </div>
            </header>

            <!-- Flashcard Area -->
            <section class="flashcard-container">
                <div class="flashcard" id="flashcard">
                    <button id="btn-hear" class="btn-hear-card" title="השמע מילה">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon">
                            <path d="M11 5L6 9H2V15H6L11 19V5Z"></path>
                            <path
                                d="M19.07 4.93C20.946 6.80596 22.0001 9.34867 22.0001 12C22.0001 14.6513 20.946 17.194 19.07 19.07"
                                stroke-width="2"></path>
                            <path
                                d="M15.54 8.46C16.4775 9.39764 17.0049 10.6692 17.0049 11.995C17.0049 13.3208 16.4775 14.5924 15.54 15.53"
                                stroke-width="2"></path>
                        </svg>
                    </button>
                    <h1 id="flashcard-text">טוען...</h1>
                </div>
                <div class="feedback-area">
                    <div id="status-message" class="status-message hidden"></div>
                </div>
            </section>


            <!-- Controls Area -->
            <section class="controls-container">
                <div class="record-wrapper">
                    <button id="btn-record" class="btn-record">
                        <img src="img/mic.svg" alt="Mic" class="mic-image">
                        <div id="audio-wave" class="audio-wave hidden">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                    </button>
                    <span id="record-text" class="record-text">החזק כדי לדבר</span>
                </div>
            </section>
        </main>

        <!-- STATUS TAB -->
        <main id="status-tab" class="tab-content">
            <div class="status-header">
                <h2>הפודיום שלי 🏆</h2>
            </div>

            <section class="status-stats-card">
                <div class="big-coins">
                    <span id="status-coins" class="coin-value">0</span>
                    <span class="coin-icon">🪙</span>
                </div>

                <div class="level-progress-area">
                    <div class="level-info">
                        <span>רמה <span id="status-level">1</span></span>
                        <span id="level-progress-text">0/10 למעבר רמה</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="status-progress" class="progress-bar-fill"></div>
                    </div>
                </div>
            </section>

            <section class="weekly-streak-section">
                <h3>ההתמדה השבועית שלך</h3>
                <p class="encouragement">כל יום של קריאה הופך אותך לאלופה!</p>
                <div class="week-calendar" id="calendar-days">
                    <!-- Days will be generated by JS -->
                </div>
            </section>

            <section class="redemption-section" id="redemption-area">
                <!-- Redemption state handled by JS -->
            </section>

            <section class="badges-section">
                <h3>המדליות שלי</h3>
                <div class="badges-grid" id="badges-container">
                    <!-- Badges will be generated by JS -->
                </div>
            </section>

            <div class="reset-container">
                <button id="btn-reset" class="btn-reset" title="איפוס התקדמות (להורים בלבד)">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="play-tab">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <span>משחק</span>
            </button>
            <button class="nav-btn" data-target="status-tab">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="7"></circle>
                    <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
                </svg>
                <span>הנקודות שלי</span>
            </button>
        </nav>
    </div>

    <!-- Celebration Overlay -->
    <div id="celebration" class="celebration-overlay hidden">
        <div class="celebration-content">
            <div class="coins-earned">+<span id="earned-amount">0</span> 🪙</div>
            <h2>מעולה!</h2>
        </div>
    </div>

    <!-- Logic to handle word registration before data files load -->
    <script>
        window.VOCABULARY_DATA = [];

        // This function will be used by your data files
        window.registerWords = (level, words) => {
            words.forEach(w => {
                const text = typeof w === 'string' ? w : w.text;
                const cleanText = (typeof w === 'object' && w.cleanText)
                    ? w.cleanText
                    : text.replace(/[\u0591-\u05C7]/g, '').replace(/[.,!?״'"]/g, '').trim().replace(/\s+/g, ' ');

                window.VOCABULARY_DATA.push({
                    text: text,
                    cleanText: cleanText,
                    level: level
                });
            });
        };
    </script>

    <!-- Data Files -->
    <script src="data/level1.js"></script>
    <script src="data/level2.js"></script>
    <script src="data/level3.js"></script>
    <script src="data/level4.js"></script>
    <script src="data/level5.js"></script>

    <script src="app.js"></script>
</body>

</html>
