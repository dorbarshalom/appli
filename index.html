<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קוראים ונהנים</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        
        <!-- PLAY TAB -->
        <main id="play-tab" class="tab-content active">
            <!-- Sticky HUD -->
            <header class="hud">
                <div class="hud-item level-badge">
                    <span class="hud-label">רמה</span>
                    <span id="hud-level" class="hud-value">1</span>
                </div>
                <div class="hud-item streak-badge" id="hud-streak-container">
                    <span class="hud-label">רצף</span>
                    <span id="hud-streak" class="hud-value">0</span>🔥
                </div>
                <div class="hud-item coins-badge">
                    <span id="hud-coins" class="hud-value">0</span>🪙
                </div>
            </header>

            <!-- Flashcard Area -->
            <section class="flashcard-container">
                <div class="flashcard" id="flashcard">
                    <h1 id="flashcard-text">טוען...</h1>
                </div>
                <div class="feedback-area">
                    <div id="status-message" class="status-message hidden"></div>
                    <button id="btn-hear" class="btn-hear hidden">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        השמעת מילה
                    </button>
                </div>
            </section>

            <!-- Controls Area -->
            <section class="controls-container">
                <button id="btn-record" class="btn-record">
                    <div class="mic-icon-container">
                        <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon mic-icon"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </div>
                    <span id="record-text" class="record-text">החזק כדי לדבר</span>
                    <div id="audio-wave" class="audio-wave hidden">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </button>
            </section>
        </main>

        <!-- STATUS TAB -->
        <main id="status-tab" class="tab-content">
            <div class="status-header">
                <h2>הפודיום שלי 🏆</h2>
            </div>

            <section class="status-stats-card">
                <div class="big-coins">
                    <span id="status-coins" class="coin-value">0</span>
                    <span class="coin-icon">🪙</span>
                </div>
                
                <div class="level-progress-area">
                    <div class="level-info">
                        <span>רמה <span id="status-level">1</span></span>
                        <span id="level-progress-text">0/10 למעבר רמה</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="status-progress" class="progress-bar-fill"></div>
                    </div>
                </div>
            </section>

            <section class="weekly-streak-section">
                <h3>ההתמדה השבועית שלך</h3>
                <p class="encouragement">כל יום של קריאה הופך אותך לאלופה!</p>
                <div class="week-calendar" id="calendar-days">
                    <!-- Days will be generated by JS -->
                </div>
            </section>

            <section class="redemption-section" id="redemption-area">
                <!-- Redemption state handled by JS -->
            </section>

            <section class="badges-section">
                <h3>המדליות שלי</h3>
                <div class="badges-grid" id="badges-container">
                    <!-- Badges will be generated by JS -->
                </div>
            </section>
            
            <div class="reset-container">
                <button id="btn-reset" class="btn-reset" title="איפוס התקדמות (להורים בלבד)">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                </button>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="play-tab">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <span>משחק</span>
            </button>
            <button class="nav-btn" data-target="status-tab">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
                <span>מצב</span>
            </button>
        </nav>
    </div>

    <!-- Celebration Overlay -->
    <div id="celebration" class="celebration-overlay hidden">
        <div class="celebration-content">
            <div class="coins-earned">+<span id="earned-amount">0</span> 🪙</div>
            <h2>מעולה!</h2>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
